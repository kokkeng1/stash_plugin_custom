name: Tags Panel
description: Replaces the tag display with an interactive badge panel on Scene, Gallery, and Image pages. Attached tags are bright; unattached are dim. Click to toggle instantly.
version: 0.1.0
url: https://github.com/kokkeng1/stash_plugin_custom

settings:
  detailPanel:
    displayName: Show in Detail Panel
    description: Switch from tag labels to togglable tag panels.
    type: BOOLEAN
  hierarchyFilter:
    displayName: Show Child Tags Only
    description: If an attached tag has child tags, show only those child tags in the panel.
    type: BOOLEAN

ui:
  javascript:
    - main.js
