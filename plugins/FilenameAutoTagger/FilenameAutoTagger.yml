name: FilenameAutoTagger
description: 파일명 키워드 기반 자동 태그 부여. 새 영상 스캔 시 자동 실행됩니다.
version: "1.0"
exec:
  - python3
  - "{pluginDir}/FilenameAutoTagger.py"
interface: raw
tasks:
  - name: 전체 영상 태그 적용
    description: 모든 영상을 대상으로 파일명 기반 태그를 일괄 적용합니다.
    defaultArgs:
      mode: all
hooks:
  - name: 스캔 후 자동 태그
    description: 새 영상 스캔 시 파일명 기반 태그를 자동으로 부여합니다.
    triggeredBy:
      - Scene.Create.Post
