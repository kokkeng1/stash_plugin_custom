name: FilenameAutoTagger
description: Automatic tagging based on filename keywords. Runs automatically when a new scene is scanned.
version: "1.0"
exec:
  - python3
  - "{pluginDir}/FilenameAutoTagger.py"
interface: raw
tasks:
  - name: Apply tags to all scenes
    description: Apply filename-based tags to all scenes.
    defaultArgs:
      mode: all
hooks:
  - name: Auto-tag on new scene scan
    description: Automatically apply filename-based tags when a new scene is scanned.
    triggeredBy:
      - Scene.Create.Post
